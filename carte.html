<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte — EcoKin Admin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="site-header"></div>

<main class="page">
  <div class="container page-head">
    <h1 style="font-size:1.5rem;">Gestion de la carte</h1>
    <p>Clique sur la carte pour placer un point de collecte ou une zone à risque.</p>
  </div>

  <div class="container">
    <div class="map-wrap mb-3">
      <div id="map"></div>
    </div>
    <div class="map-legend mb-3">
      <span><span class="dot" style="background:#2D6CDF;"></span> Signalements validés (référence)</span>
      <span><span class="dot" style="background:#2E7D32;"></span> Point de collecte</span>
      <span><span class="dot" style="background:#C0392B;"></span> Zone à risque</span>
    </div>

    <div class="tabs-inline">
      <button class="is-active" data-tab="points" onclick="switchTab('points')">Points de collecte</button>
      <button data-tab="zones" onclick="switchTab('zones')">Zones à risque</button>
    </div>

    <!-- Formulaire Points de collecte -->
    <div id="tab-points">
      <form id="pointForm" class="mb-4">
        <input type="hidden" id="pointId">
        <div class="row g-2">
          <div class="col-md-6"><label class="form-label">Nom</label><input class="form-control" id="pointNom" required></div>
          <div class="col-md-6"><label class="form-label">Adresse</label><input class="form-control" id="pointAdresse" required></div>
          <div class="col-md-4"><label class="form-label">Type de déchet</label><input class="form-control" id="pointType" placeholder="Ex : plastique, organique…"></div>
          <div class="col-md-4"><label class="form-label">Horaires</label><input class="form-control" id="pointHoraires" placeholder="Ex : 7h-17h"></div>
          <div class="col-md-4"><label class="form-label">Contact</label><input class="form-control" id="pointContact"></div>
        </div>
        <div class="form-text mb-2" id="pointCoordsText">Clique sur la carte pour placer ce point.</div>
        <div class="d-flex gap-2">
          <button class="btn btn-primary" type="submit">Enregistrer</button>
          <button class="btn btn-ghost" type="button" onclick="resetPointForm()">Annuler</button>
        </div>
      </form>
      <table class="data-table">
        <thead><tr><th>Nom</th><th>Adresse</th><th>Type</th><th>Actions</th></tr></thead>
        <tbody id="pointsTableBody"><tr><td colspan="4"><div class="spinner" style="margin:1rem auto;"></div></td></tr></tbody>
      </table>
    </div>

    <!-- Formulaire Zones à risque -->
    <div id="tab-zones" style="display:none;">
      <form id="zoneForm" class="mb-4">
        <input type="hidden" id="zoneId">
        <div class="row g-2">
          <div class="col-md-6"><label class="form-label">Nom</label><input class="form-control" id="zoneNom" required></div>
          <div class="col-md-6"><label class="form-label">Commune</label><input class="form-control" id="zoneCommune"></div>
          <div class="col-md-4">
            <label class="form-label">Niveau de risque</label>
            <select class="form-select" id="zoneNiveau">
              <option value="faible">Faible</option>
              <option value="moyen" selected>Moyen</option>
              <option value="eleve">Élevé</option>
              <option value="critique">Critique</option>
            </select>
          </div>
          <div class="col-md-4"><label class="form-label">Rayon (mètres)</label><input type="number" class="form-control" id="zoneRayon" value="100" min="1"></div>
          <div class="col-md-12"><label class="form-label">Description</label><textarea class="form-control" id="zoneDescription" rows="2"></textarea></div>
        </div>
        <div class="form-text mb-2" id="zoneCoordsText">Clique sur la carte pour placer cette zone.</div>
        <div class="d-flex gap-2">
          <button class="btn btn-primary" type="submit">Enregistrer</button>
          <button class="btn btn-ghost" type="button" onclick="resetZoneForm()">Annuler</button>
        </div>
      </form>
      <table class="data-table">
        <thead><tr><th>Nom</th><th>Commune</th><th>Niveau</th><th>Actions</th></tr></thead>
        <tbody id="zonesTableBody"><tr><td colspan="4"><div class="spinner" style="margin:1rem auto;"></div></td></tr></tbody>
      </table>
    </div>
  </div>
</main>

<div id="bottom-nav-slot"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/include.js"></script>
<script src="js/carte.js"></script>
</body>
</html>
