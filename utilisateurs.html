<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utilisateurs — EcoKin Admin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="site-header"></div>

<main class="page">
  <div class="container page-head" style="display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:0.8rem;">
    <div>
      <h1 style="font-size:1.5rem;">Utilisateurs</h1>
      <p style="margin-bottom:0;">Gère les comptes citoyens inscrits sur EcoKin.</p>
    </div>
    <button class="btn btn-primary" id="newUserBtn" type="button"><i class="fa-solid fa-plus"></i> Nouvel utilisateur</button>
  </div>

  <div class="container">
    <table class="data-table">
      <thead><tr><th>Nom</th><th>Email</th><th>Commune</th><th>Rôle</th><th>Statut</th><th>Actions</th></tr></thead>
      <tbody id="tableBody">
        <tr><td colspan="6"><div class="spinner" style="margin:1rem auto;"></div></td></tr>
      </tbody>
    </table>
  </div>
</main>

<div id="modalSlot"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/include.js"></script>
<script src="js/utilisateurs.js"></script>
</body>
</html>
