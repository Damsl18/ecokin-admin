<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tableau de bord — EcoKin Admin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="site-header"></div>

<main class="page">
  <div class="container page-head">
    <h1 style="font-size:1.6rem;">Tableau de bord</h1>
    <p>Vue d'ensemble de l'activité sur EcoKin.</p>
  </div>

  <div class="container">
    <div class="widget-grid mb-4" id="widgetsGrid">
      <div class="widget"><div class="spinner"></div></div>
    </div>

    <div class="row g-3">
      <div class="col-md-6">
        <div class="widget" style="padding:1.4rem;">
          <h3 style="font-size:1rem;"><i class="fa-solid fa-triangle-exclamation" style="color:var(--c-amber);"></i> Signalements en attente</h3>
          <p class="mb-2">Des signalements attendent ta validation.</p>
          <a href="signalements.html?statut=en_attente" class="btn btn-primary btn-sm">Voir la file d'attente</a>
        </div>
      </div>
      <div class="col-md-6">
        <div class="widget" style="padding:1.4rem;">
          <h3 style="font-size:1rem;"><i class="fa-solid fa-newspaper" style="color:var(--c-amber);"></i> Articles en attente</h3>
          <p class="mb-2">Des articles attendent ta modération.</p>
          <a href="articles.html?statut=en_attente" class="btn btn-primary btn-sm">Voir la file d'attente</a>
        </div>
      </div>
    </div>
  </div>
</main>

<div id="bottom-nav-slot"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/include.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
