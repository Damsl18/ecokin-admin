<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tableau de bord — EcoKin Admin</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="site-header"></div>

<main class="page">
  <div class="container page-head">
    <h1>Tableau de bord</h1>
    <p>Vue d'ensemble de l'activité sur EcoKin.</p>
  </div>

  <div class="container">
    <div class="widget-grid mb-4" id="widgetsGrid">
      <div class="widget"><div class="spinner"></div></div>
    </div>

    <h2 style="font-size:0.95rem; color:var(--text-soft); text-transform:uppercase; letter-spacing:0.04em; margin-top:0.8rem;">Activité des 7 derniers jours</h2>
    <div class="widget-grid mb-4" id="widgetsGrid7j" style="grid-template-columns:repeat(auto-fit, minmax(160px, 1fr));">
      <div class="widget"><div class="spinner"></div></div>
    </div>

    <div id="alertsZone" class="alerts-grid"></div>
  </div>
</main>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/include.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
