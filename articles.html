<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Articles — EcoKin Admin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="site-header"></div>

<main class="page">
  <div class="container page-head" style="display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:0.8rem;">
    <div>
      <h1 style="font-size:1.5rem;">Articles</h1>
      <p style="margin-bottom:0;">Modère les articles soumis, ou publie directement les tiens.</p>
    </div>
    <button class="btn btn-primary" id="newArticleBtn" type="button"><i class="fa-solid fa-plus"></i> Nouvel article</button>
  </div>

  <div class="container">
    <div class="filters-bar">
      <select id="statutFilter" class="form-select">
        <option value="">Tous les statuts</option>
        <option value="en_attente">En attente</option>
        <option value="publie">Publié</option>
        <option value="rejete">Rejeté</option>
      </select>
    </div>

    <table class="data-table">
      <thead><tr><th>Titre</th><th>Auteur</th><th>Date</th><th>Statut</th><th>Actions</th></tr></thead>
      <tbody id="tableBody">
        <tr><td colspan="5"><div class="spinner" style="margin:1rem auto;"></div></td></tr>
      </tbody>
    </table>
  </div>
</main>

<div id="modalSlot"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/include.js"></script>
<script src="js/articles.js"></script>
</body>
</html>
